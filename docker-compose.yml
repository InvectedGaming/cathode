# Cathode — self-hosted IPTV manager + viewer
#
#   Just Cathode:            docker compose up -d            →  http://localhost:7777
#   Cathode + VPN (Gluetun): docker compose --profile vpn up -d
#
# Create your admin account in the UI on first run. Streaming + the HDHomeRun
# tuner are locked behind an auto-generated key — grab the tuner URL from
# Settings → Access & Tuner and paste it into Plex/Jellyfin.
#
# VPN: run one Gluetun per region (each exposes an HTTP proxy on :8888). Add each
# as a named endpoint in Settings → VPN, then per Source pick which VPN it uses —
# Source A → Japan, Source B → UK, etc. Cathode runs OUTSIDE the tunnels and only
# routes the sources you choose, so one instance mixes VPN and non-VPN providers.

services:
  cathode:
    build: .
    # image: ghcr.io/<you>/cathode:latest   # swap in once you publish an image
    container_name: cathode
    restart: unless-stopped
    ports:
      - "${CATHODE_PORT:-7777}:7777"
    volumes:
      - cathode-data:/data            # SQLite DB + DVR recordings persist here
    environment:
      BASE_URL: ${BASE_URL:-}         # public URL for HDHR discovery; blank = request host
      CATHODE_STREAM_KEY: ${CATHODE_STREAM_KEY:-}   # pin the tuner/stream key; blank = auto-generated
      TZ: ${TZ:-UTC}
    networks: [cathode]

  # ──────────────────────────────────────────────────────────────────────────
  # Optional VPN via Gluetun. Starts with:  docker compose --profile vpn up -d
  # Add this container's proxy in Settings → VPN as an endpoint:
  #     http://gluetun-jp:8888
  # Want a second region? Copy this whole block to `gluetun-uk` with that
  # region's creds (SERVER_COUNTRIES: United Kingdom), and add it as another
  # endpoint (http://gluetun-uk:8888). Repeat per region.
  # ──────────────────────────────────────────────────────────────────────────
  gluetun-jp:
    image: qmcgaw/gluetun:latest
    container_name: gluetun-jp
    profiles: ["vpn"]
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # --- your VPN provider (see github.com/qdm12/gluetun-wiki) ---
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER:-}
      VPN_TYPE: ${VPN_TYPE:-wireguard}
      # WireGuard:
      WIREGUARD_PRIVATE_KEY: ${JP_WIREGUARD_PRIVATE_KEY:-}
      WIREGUARD_ADDRESSES: ${JP_WIREGUARD_ADDRESSES:-}
      # OpenVPN (if VPN_TYPE=openvpn):
      OPENVPN_USER: ${OPENVPN_USER:-}
      OPENVPN_PASSWORD: ${OPENVPN_PASSWORD:-}
      SERVER_COUNTRIES: ${JP_SERVER_COUNTRIES:-Japan}
      # Built-in HTTP proxy Cathode routes chosen sources through:
      HTTPPROXY: "on"
      HTTPPROXY_LISTENING_ADDRESS: ":8888"
      TZ: ${TZ:-UTC}
    networks: [cathode]

networks:
  cathode:
    name: cathode

volumes:
  cathode-data:
